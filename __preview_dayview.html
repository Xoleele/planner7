<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<style>body{padding:0;margin:0} .preview-wrap{height:100vh;display:flex;flex-direction:column}</style>
</head><body>
<div class="app-container"><div class="main-layout">
<section id="day-view" class="day-view" aria-label="Vista de día" style="height:100vh">
  <div class="day-view-header"><span id="day-view-date" class="day-view-date"></span></div>
  <div class="day-view-scroll"><div id="day-view-grid" class="day-view-grid"></div></div>
</section>
</div></div>
<script>
const tags=[{id:'default',color:{bg:'#eef2ff',text:'#3730a3',border:'#c7d2fe'},visible:true},
{id:'work',color:{bg:'#fef3c7',text:'#92400e',border:'#fde68a'},visible:true}];
const tasks=[
 {id:1,title:'Reunión de equipo',startTime:'08:00',endTime:'10:00',tagId:'work'},
 {id:2,title:'Almuerzo',startTime:'13:00',endTime:'14:00',tagId:'default'},
 {id:3,title:'Revisión solapada',startTime:'13:30',endTime:'15:00',tagId:'work'},
 {id:4,title:'Cierre del día',startTime:'22:00',endTime:'23:00',tagId:'default',completed:true},
 {id:5,title:'Sin horario (no debe verse)',tagId:'default'}
];
function formatDate(d){return d.toISOString().slice(0,10);}
function formatSingleDate(d){return 'Martes 16/06/2026';}
function checkTaskOccurrence(){return true;}
function timeStringToMinutes(s){if(!s||typeof s!=='string')return null;const m=s.match(/^(\d{1,2}):(\d{2})$/);if(!m)return null;const h=+m[1],mi=+m[2];if(h<0||h>23||mi<0||mi>59)return null;return h*60+mi;}
function renderDayView(){
 const grid=document.getElementById('day-view-grid');const dateLabel=document.getElementById('day-view-date');
 const today=new Date();const todayStr=formatDate(today);if(dateLabel)dateLabel.textContent=formatSingleDate(today);
 grid.innerHTML='';const HOUR_HEIGHT=60;
 for(let h=0;h<24;h++){const l=document.createElement('span');l.className='dv-hour-label';l.style.top=(h*HOUR_HEIGHT)+'px';l.textContent=String(h).padStart(2,'0')+':00';grid.appendChild(l);const ln=document.createElement('div');ln.className='dv-hour-line';ln.style.top=(h*HOUR_HEIGHT)+'px';grid.appendChild(ln);}
 const ll=document.createElement('div');ll.className='dv-hour-line';ll.style.top=(24*HOUR_HEIGHT)+'px';grid.appendChild(ll);
 const ta=document.createElement('div');ta.className='dv-tasks-area';grid.appendChild(ta);
 const dayTasks=tasks.filter(t=>{const tag=tags.find(x=>x.id===t.tagId)||tags.find(x=>x.id==='default');if(tag&&tag.visible===false)return false;const s=timeStringToMinutes(t.startTime),e=timeStringToMinutes(t.endTime);return s!==null&&e!==null&&e>s;});
 dayTasks.forEach(t=>{const s=timeStringToMinutes(t.startTime),e=timeStringToMinutes(t.endTime);const b=document.createElement('div');b.className='dv-task-block';if(t.completed)b.classList.add('completed');const tag=tags.find(x=>x.id===t.tagId)||tags.find(x=>x.id==='default');if(tag&&tag.color){b.style.setProperty('--tag-bg',tag.color.bg);b.style.setProperty('--tag-text',tag.color.text);b.style.setProperty('--tag-border',tag.color.border);}b.style.top=s+'px';b.style.height=Math.max(e-s,18)+'px';const te=document.createElement('div');te.className='dv-task-title';te.textContent=t.title;b.appendChild(te);const tm=document.createElement('div');tm.className='dv-task-time';tm.textContent=t.startTime+' – '+t.endTime;b.appendChild(tm);ta.appendChild(b);});
}
renderDayView();
window.__taskCount=document.querySelectorAll('.dv-task-block').length;
</script></body></html>
